---
- name: Setup backup automation on Odoo server
  hosts: production
  become: true

  tasks:

    - name: Install AWS CLI
      apt:
        name: awscli
        state: present
        update_cache: yes

    - name: Create scripts directory
      file:
        path: /home/ubuntu/scripts
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy backup script to server
      copy:
        src: files/backup.sh
        dest: /home/ubuntu/scripts/backup.sh
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Create log file
      file:
        path: /var/log/odoo-backup.log
        state: touch
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Schedule daily backup at 2am
      cron:
        name: "Odoo daily database backup"
        user: ubuntu
        hour: "2"
        minute: "0"
        job: "/home/ubuntu/scripts/backup.sh >> /var/log/odoo-backup.log 2>&1"

    - name: Run backup now to verify it works
      command: /home/ubuntu/scripts/backup.sh
      become: true
      become_user: ubuntu
      register: backup_result

    - name: Show backup result
      debug:
        var: backup_result.stdout_lines
